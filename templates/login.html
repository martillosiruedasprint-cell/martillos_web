<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Martillos & Ruedas</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor de la Intro (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        /* SIN LÍMITES DE RECUADRO: Sin bordes, sin fondos, totalmente invisible */
        .video-wrapper {
            position: relative;
            max-width: 95%;      
            width: 960px;        /* Mantiene el tamaño grande objetivo */
            max-height: 85vh;    
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; /* Eliminado el fondo gris */
            border: none;            /* Eliminado el borde amarillo restrictivo */
            box-shadow: none;        /* Eliminada la sombra */
            overflow: visible;
        }

        /* El video ahora fluye libremente mostrando su forma nativa exacta y completa */
        #splash-screen video {
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            display: block;
            border-radius: 8px; /* Un ligero redondeado en las esquinas del propio video para estética */
        }

        /* Capa de Play Inicial: Ahora se acopla perfectamente a los bordes reales del video */
        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            cursor: pointer;
            border-radius: 8px;
        }

        .play-button-icon {
            width: 90px;
            height: 90px;
            background: #ffeb3b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 38px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.6);
            transition: transform 0.2s;
        }

        #play-overlay:hover .play-button-icon {
            transform: scale(1.1);
        }

        /* Controles inferiores */
        .controles-intro {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        .btn-intro {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 22px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-intro:hover {
            background: #ffeb3b;
            color: #000;
            border-color: #ffeb3b;
        }

        /* Contenedor del Formulario */
        .login-box {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ffeb3b;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.15);
        }
        
        .logo-img {
            max-width: 120px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .input-field:focus {
            border-color: #ffeb3b;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #ffeb3b;
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE INTRO (VIDEO LIBRE SIN CONTENEDOR RESTRICTIVO CON AUDIO) -->
    {% if config.video %}
    <div id="splash-screen">
        <div class="video-wrapper">
            <video id="intro-video" playsinline>
                <source src="{{ url_for('static', filename='uploads/' + config.video) }}" type="video/mp4">
            </video>
            
            <!-- Capa de Play Inicial -->
            <div id="play-overlay" onclick="iniciarConAudio()">
                <div class="play-button-icon">▶</div>
                <span style="font-weight:bold; letter-spacing:1px; text-transform:uppercase; font-size:15px; color:#ffeb3b;">Reproducir Presentación</span>
            </div>
        </div>

        <div class="controles-intro">
            <button class="btn-intro" onclick="finalizarIntro()">Omitir Intro ✕</button>
        </div>
    </div>
    {% endif %}

    <!-- CONTENEDOR PRINCIPAL DE LOGIN -->
    <div class="login-box">
        {% if config.imagen %}
            <img src="{{ url_for('static', filename='uploads/' + config.imagen) }}" class="logo-img" alt="Logo">
        {% else %}
            <h1 style="color:#ffeb3b; font-size:24px; margin-bottom:5px;">Martillos & Ruedas</h1>
        {% endif %}
        
        <h3 style="color:#aaa; margin-top:0; font-weight:normal; font-size:14px;">Transporte Local Seguro</h3>
        
        <form method="POST">
            <div style="text-align:left; font-size:14px; color:#ccc;">
                Correo Electrónico:<br>
                <input type="email" name="email" required class="input-field" placeholder="tu@correo.com"><br>
                Contraseña:<br>
                <input type="password" name="password" required class="input-field" placeholder="••••••••"><br>
            </div>
            <button type="submit" class="btn-submit">ENTRAR</button>
            <p style="font-size:12px; margin-top:20px; color:#aaa;">
                ¿Eres pasajero nuevo? <a href="/registro_pasajero" style="color:#ffeb3b; text-decoration:none; font-weight:bold;">Regístrate aquí</a>
            </p>
        </form>
    </div>

    <script>
        const video = document.getElementById('intro-video');
        const splash = document.getElementById('splash-screen');
        const playOverlay = document.getElementById('play-overlay');

        function iniciarConAudio() {
            if (video) {
                video.muted = false; 
                video.volume = 1.0;  
                video.play()
                .then(() => {
                    playOverlay.style.display = 'none'; 
                })
                .catch(err => {
                    console.log("Error al iniciar reproducción:", err);
                });
            }
        }

        if (video) {
            video.onended = function() {
                finalizarIntro();
            };
        }

        function finalizarIntro() {
            if (splash) {
                if (video) {
                    video.pause(); 
                }
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }
        }
        
        setTimeout(() => {
            if (splash && splash.style.display !== 'none' && (!video || video.paused)) {
                finalizarIntro();
            }
        }, 15000);
    </script>
</body>
</html>
