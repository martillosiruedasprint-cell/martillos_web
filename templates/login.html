<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Martillos & Ruedas</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #ffeb3b; width: 320px; text-align: center; }
        .input-field { width: 100%; padding: 10px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #ffeb3b; color: #000; border: none; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color:#ffeb3b; margin-bottom:5px;">Martillos & Ruedas</h2>
        <p style="color:#aaa; font-size:13px; margin-top:0;">Control de Flota y Pasajeros</p>
        
        <form method="POST">
            <div style="text-align:left; font-size:14px; color:#ccc;">
                Correo Electrónico:<br>
                <input type="email" name="email" required class="input-field" placeholder="correo@ejemplo.com"><br>
                Contraseña:<br>
                <input type="password" name="password" required class="input-field" placeholder="••••••••"><br>
            </div>
            <button type="submit" class="btn-submit">INGRESAR</button>
        </form>

        <p style="font-size:12px; margin-top:20px; color:#aaa;">
            ¿Eres pasajero nuevo? <a href="/registro_pasajero" style="color:#ffeb3b; text-decoration:none; font-weight:bold;">Regístrate aquí</a>
        </p>
    </div>
</body>
</html>
