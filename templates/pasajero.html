<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero | Martillos & Ruedas</title>
    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: sans-serif; padding: 25px; }
        h1, h2, h3 { color: #ffeb3b; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #161616; border: 1px solid #333; padding: 25px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0 4px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .input-field:focus { border-color: #ffeb3b; outline: none; }
        .btn { padding: 14px 20px; background: #ffeb3b; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 16px; margin-top: 15px; }
        .btn:hover { background: #fbc02d; }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .btn-logout { float: right; background: #ff3b30; color:#fff; text-decoration:none; padding:10px 20px; border-radius:6px; font-weight:bold; }
        .status { padding: 12px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .status.success { background: #4cd964; color: #000; }
        .status.error { background: #ff3b30; color: #fff; }
        .status.info { background: #29b6f6; color: #000; }
        
        .autocomplete-suggestions {
            position: absolute;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            width: calc(100% - 50px);
            z-index: 999;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: none;
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }
        .suggestion-item:hover {
            background-color: #333;
            color: #ffeb3b;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/logout" class="btn-logout">Salir</a>
        <h1>Hola, {{ nombre }}</h1>

        <div id="status-container">
            <!-- Mensaje de carga del GPS -->
            <div id="gps-status" class="status info">🛰️ Obteniendo tu ubicación exacta por GPS...</div>
        </div>

        <!-- SOLICITAR VIAJE -->
        <div class="card">
            <h3>🚖 Solicitar Nuevo Viaje</h3>
            <p style="color: #aaa; font-size: 14px; margin-top: 0;">Límite del servicio: San Juan de los Morros. Tarifas de 1.000 Bs. a 10.000 Bs.</p>
            
            <form action="/solicitar_viaje" method="POST" autocomplete="off" id="form-viaje">
                <!-- Campo de origen OCULTO, se llena automáticamente por GPS -->
                <input type="hidden" id="origen" name="origen" value="Ubicación GPS no detectada">
                
                <div style="position: relative; margin-bottom: 12px;">
                    ¿A dónde vas? (Destino):
                    <input type="text" id="destino" name="destino" required class="input-field" placeholder="Escribe tu destino en San Juan...">
                    <div id="destino-suggestions" class="autocomplete-suggestions"></div>
                </div>
                
                Monto del Viaje (Bs.):
                <input type="number" name="monto" min="1000" max="10000" required class="input-field" placeholder="Ej: 2500">
                
                <!-- Deshabilitamos el botón hasta que tengamos la ubicación del GPS -->
                <button type="submit" id="btn-pedir" class="btn" disabled>Esperando ubicación GPS...</button>
            </form>
        </div>
    </div>

    <script>
        const bboxSanJuan = "-67.380,9.880,-67.320,9.930"; 
        const gpsStatusDiv = document.getElementById('gps-status');
        const btnPedir = document.getElementById('btn-pedir');
        const inputOrigenOculto = document.getElementById('origen');

        // --- SISTEMA GPS DEL DISPOSITIVO ---
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Consultamos el servidor gratuito de OpenStreetMap para traducir las coordenadas a una dirección real
                    const reverseUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

                    fetch(reverseUrl, { headers: { 'Accept-Language': 'es' } })
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.display_name) {
                                // Limpiamos el texto largo para que sea legible por el chofer
                                let direccionSencilla = data.display_name.split(',').slice(0, 3).join(',');
                                inputOrigenOculto.value = `📍 Ubicación actual (${direccionSencilla})`;
                                
                                // Actualizamos los elementos visuales
                                gpsStatusDiv.className = "status success";
                                gpsStatusDiv.innerHTML = `✅ Ubicación detectada: <i>${direccionSencilla}</i>`;
                                btnPedir.disabled = false;
                                btnPedir.textContent = "Pedir Moto Ahora";
                            } else {
                                fallbackGps(lat, lon);
                            }
                        })
                        .catch(() => {
                            fallbackGps(lat, lon);
                        });
                },
                (error) => {
                    console.error("Error de geolocalización: ", error);
                    gpsStatusDiv.className = "status error";
                    gpsStatusDiv.innerHTML = "❌ No pudimos acceder a tu GPS. Por favor activa los permisos de ubicación en tu navegador para continuar.";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            gpsStatusDiv.className = "status error";
            gpsStatusDiv.innerHTML = "❌ Tu navegador no soporta la detección automática de ubicación.";
        }

        function fallbackGps(lat, lon) {
            // En caso de que el traductor de direcciones falle, enviamos las coordenadas directas al conductor
            inputOrigenOculto.value = `📍 Coordenadas GPS (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
            gpsStatusDiv.className = "status success";
            gpsStatusDiv.innerHTML = "✅ Ubicación fijada por coordenadas GPS.";
            btnPedir.disabled = false;
            btnPedir.textContent = "Pedir Moto Ahora";
        }

        // --- AUTOCOMPLETADO DE DESTINO ---
        function configurarAutocompletarDestino() {
            const input = document.getElementById('destino');
            const suggestionsContainer = document.getElementById('destino-suggestions');
            let timeout = null;

            input.addEventListener('input', function() {
                clearTimeout(timeout);
                const query = input.value.trim();

                if (query.length < 3) {
                    suggestionsContainer.style.display = 'none';
                    return;
                }

                timeout = setTimeout(() => {
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&viewbox=${bboxSanJuan}&bounded=1&countrycodes=ve&limit=5`;

                    fetch(url, { headers: { 'Accept-Language': 'es' } })
                    .then(response => response.json())
                    .then(data => {
                        suggestionsContainer.innerHTML = '';
                        if (data.length === 0) {
                            suggestionsContainer.style.display = 'none';
                            return;
                        }

                        data.forEach(item => {
                            let nombreLimpio = item.display_name.split(',').slice(0, 3).join(',');

                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.textContent = nombreLimpio;
                            
                            div.addEventListener('click', function() {
                                input.value = nombreLimpio;
                                suggestionsContainer.style.display = 'none';
                            });

                            suggestionsContainer.appendChild(div);
                        });
                        suggestionsContainer.style.display = 'block';
                    })
                    .catch(err => console.error("Error al buscar destino: ", err));
                }, 400);
            });

            document.addEventListener('click', function(e) {
                if (e.target !== input && e.target !== suggestionsContainer) {
                    suggestionsContainer.style.display = 'none';
                }
            });
        }

        configurarAutocompletarDestino();

        // Alertas de estado
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const container = document.getElementById('status-container');
        if (status === 'success') {
            const successDiv = document.createElement('div');
            successDiv.className = 'status success';
            successDiv.textContent = '¡Viaje solicitado con éxito! Esperando conductor...';
            container.appendChild(successDiv);
        } else if (status === 'limite_monto') {
            const errDiv = document.createElement('div');
            errDiv.className = 'status error';
            errDiv.textContent = 'El monto debe estar entre 1.000 Bs. y 10.000 Bs.';
            container.appendChild(errDiv);
        }
    </script>
</body>
</html>
