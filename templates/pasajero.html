<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero | Martillos & Ruedas</title>
    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: sans-serif; padding: 25px; }
        h1, h2, h3 { color: #ffeb3b; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #161616; border: 1px solid #333; padding: 25px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0 16px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .input-field:focus { border-color: #ffeb3b; outline: none; }
        .btn { padding: 14px 20px; background: #ffeb3b; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 16px; }
        .btn:hover { background: #fbc02d; }
        .btn-logout { float: right; background: #ff3b30; color:#fff; text-decoration:none; padding:10px 20px; border-radius:6px; font-weight:bold; }
        .status { padding: 12px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .status.success { background: #4cd964; color: #000; }
        .status.error { background: #ff3b30; color: #fff; }
        .pac-container { background-color: #222 !important; border: 1px solid #444; border-radius: 6px; }
        .pac-item { color: #fff !important; border-top: 1px solid #333; }
        .pac-item:hover { background-color: #333 !important; }
        .pac-item-query { color: #ffeb3b !important; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/logout" class="btn-logout">Salir</a>
        <h1>Hola, {{ nombre }}</h1>

        <div id="status-container"></div>

        <!-- SOLICITAR VIAJE -->
        <div class="card">
            <h3>🚖 Solicitar Nuevo Viaje</h3>
            <p style="color: #aaa; font-size: 14px; margin-top: 0;">Los pagos se realizan en Bs. Tarifa permitida: 1.000 Bs. a 10.000 Bs.</p>
            <form action="/solicitar_viaje" method="POST">
                Dirección de Origen:
                <input type="text" id="origen" name="origen" required class="input-field" placeholder="Buscar dirección de salida...">
                
                Dirección de Destino:
                <input type="text" id="destino" name="destino" required class="input-field" placeholder="Buscar destino...">
                
                Monto del Viaje (Bs.):
                <input type="number" name="monto" min="1000" max="10000" required class="input-field" placeholder="Ej: 2500">
                
                <button type="submit" class="btn">Pedir Moto Ahora</button>
            </form>
        </div>
    </div>

    <!-- Script de Autocompletado de Google Maps limitado a San Juan de los Morros -->
    <script>
        function initAutocomplete() {
            // Coordenadas aproximadas de San Juan de los Morros, Venezuela
            const sanJuanBounds = new google.maps.LatLngBounds(
                new google.maps.LatLng(9.880, -67.380), // Suroeste
                new google.maps.LatLng(9.930, -67.320)  // Noreste
            );

            const options = {
                bounds: sanJuanBounds,
                strictBounds: true, // Esto obliga al buscador a limitarse estrictamente a la caja de San Juan de los Morros
                componentRestrictions: { country: "ve" } // Solo en Venezuela
            };

            const inputOrigen = document.getElementById('origen');
            const inputDestino = document.getElementById('destino');

            new google.maps.places.Autocomplete(inputOrigen, options);
            new google.maps.places.Autocomplete(inputDestino, options);
        }

        // Manejo de mensajes de estado
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const container = document.getElementById('status-container');
        if (status === 'success') {
            container.innerHTML = '<div class="status success">¡Viaje solicitado con éxito! Esperando conductor...</div>';
        } else if (status === 'limite_monto') {
            container.innerHTML = '<div class="status error">El monto debe estar entre 1.000 Bs. y 10.000 Bs.</div>';
        } else if (status === 'error') {
            container.innerHTML = '<div class="status error">Hubo un error al procesar tu solicitud. Intenta de nuevo.</div>';
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&libraries=places&callback=initAutocomplete" async defer></script>
</body>
</html>
