<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasajero | Martillos & Ruedas</title>
    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: sans-serif; padding: 25px; }
        h1, h2, h3 { color: #ffeb3b; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #161616; border: 1px solid #333; padding: 25px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0 4px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .input-field:focus { border-color: #ffeb3b; outline: none; }
        .btn { padding: 14px 20px; background: #ffeb3b; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 16px; margin-top: 15px; }
        .btn:hover { background: #fbc02d; }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .btn-logout { float: right; background: #ff3b30; color:#fff; text-decoration:none; padding:10px 20px; border-radius:6px; font-weight:bold; }
        .status { padding: 12px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .status.success { background: #4cd964; color: #000; }
        .status.error { background: #ff3b30; color: #fff; }
        .status.info { background: #29b6f6; color: #000; }
        
        /* Contenedor flotante para las sugerencias del buscador */
        .autocomplete-suggestions {
            position: absolute;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            max-height: 220px;
            overflow-y: auto;
            width: calc(100% - 2px);
            z-index: 999;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: none;
        }
        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            font-size: 14px;
            text-align: left;
        }
        .suggestion-item:hover {
            background-color: #333;
            color: #ffeb3b;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/logout" class="btn-logout">Salir</a>
        <h1>Hola, {{ nombre }}</h1>

        <div id="status-container">
            <!-- Mensaje inicial de control de GPS -->
            <div id="gps-status" class="status info">🔒 Se requiere permiso para acceder a tu ubicación. Esperando autorización...</div>
        </div>

        <!-- SOLICITAR VIAJE -->
        <div class="card">
            <h3>🚖 Solicitar Nuevo Viaje</h3>
            <p style="color: #aaa; font-size: 14px; margin-top: 0; margin-bottom: 15px;">
                Límite del servicio: San Juan de los Morros.<br>
                <strong style="color: #ffeb3b;">Tarifa fija por carrera: 700 Bs.</strong>
            </p>
            
            <form action="/solicitar_viaje" method="POST" autocomplete="off" id="form-viaje">
                <!-- Parámetros ocultos calculados de manera automática -->
                <input type="hidden" id="origen" name="origen" value="Ubicación GPS no detectada">
                <input type="hidden" name="monto" value="700">
                
                <div style="position: relative; margin-bottom: 12px;">
                    ¿A dónde vas? (Destino):
                    <input type="text" id="destino" name="destino" required class="input-field" placeholder="Ej: Plaza Bolívar, Los Samanes, Hospital...">
                    <div id="destino-suggestions" class="autocomplete-suggestions"></div>
                </div>
                
                <!-- El botón se activará sólo cuando el GPS responda exitosamente -->
                <button type="submit" id="btn-pedir" class="btn" disabled>Activa el GPS para solicitar</button>
            </form>
        </div>
    </div>

    <script>
        const gpsStatusDiv = document.getElementById('gps-status');
        const btnPedir = document.getElementById('btn-pedir');
        const inputOrigenOculto = document.getElementById('origen');

        // --- SOLICITUD Y TRADUCCIÓN DE GEOLOCALIZACIÓN (GPS) ---
        function solicitarUbicacion() {
            if (navigator.geolocation) {
                gpsStatusDiv.innerHTML = "🛰️ Conectando con los satélites GPS del teléfono...";
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;

                        // Consulta de geocodificación inversa (traducir coordenadas a nombre de calle)
                        const reverseUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

                        fetch(reverseUrl, { 
                            headers: { 
                                'Accept-Language': 'es',
                                'User-Agent': 'MartillosYRuedasApp/1.0'
                            } 
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.display_name) {
                                // Reducimos la dirección para evitar textos inmensamente largos
                                let direccionSencilla = data.display_name.split(',').slice(0, 3).join(',');
                                inputOrigenOculto.value = `📍 Ubicación actual (${direccionSencilla})`;
                                
                                gpsStatusDiv.className = "status success";
                                gpsStatusDiv.innerHTML = `✅ Ubicación autorizada: <i>${direccionSencilla}</i>`;
                                btnPedir.disabled = false;
                                btnPedir.textContent = "Pedir Moto Ahora (700 Bs.)";
                            } else {
                                fallbackGps(lat, lon);
                            }
                        })
                        .catch(() => {
                            fallbackGps(lat, lon);
                        });
                    },
                    (error) => {
                        console.error("Error de geolocalización: ", error);
                        gpsStatusDiv.className = "status error";
                        
                        if(error.code === error.PERMISSION_DENIED) {
                            gpsStatusDiv.innerHTML = "❌ Permiso denegado. Debes permitir el acceso a la ubicación en los ajustes de tu teléfono para poder pedir el viaje.";
                        } else {
                            gpsStatusDiv.innerHTML = "❌ Error al obtener tu señal de GPS. Inténtalo de nuevo o muévete a un espacio abierto.";
                        }
                    },
                    { enableHighAccuracy: true, timeout: 15000 }
                );
            } else {
                gpsStatusDiv.className = "status error";
                gpsStatusDiv.innerHTML = "❌ Tu dispositivo no es compatible con geolocalización nativa.";
            }
        }

        // Respaldo en caso de fallo en el resolvedor de nombres de calles
        function fallbackGps(lat, lon) {
            inputOrigenOculto.value = `📍 Coordenadas GPS (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
            gpsStatusDiv.className = "status success";
            gpsStatusDiv.innerHTML = "✅ Ubicación fijada mediante coordenadas satelitales directas.";
            btnPedir.disabled = false;
            btnPedir.textContent = "Pedir Moto Ahora (700 Bs.)";
        }

        // Ejecutar la petición del GPS inmediatamente al renderizar la interfaz
        window.onload = () => {
            solicitarUbicacion();
        };

        // --- AUTOCOMPLETADO DE DESTINO INTELIGENTE ---
        function configurarAutocompletarDestino() {
            const input = document.getElementById('destino');
            const suggestionsContainer = document.getElementById('destino-suggestions');
            let timeout = null;

            input.addEventListener('input', function() {
                clearTimeout(timeout);
                const query = input.value.trim();

                if (query.length < 3) {
                    suggestionsContainer.style.display = 'none';
                    return;
                }

                timeout = setTimeout(() => {
                    // Inyectamos el contexto geográfico para forzar al servidor a buscar dentro de la región
                    const consultaOptimizada = `${query}, San Juan de los Morros, Guarico`;
                    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(consultaOptimizada)}&countrycodes=ve&limit=10`;

                    fetch(url, { 
                        headers: { 
                            'Accept-Language': 'es',
                            'User-Agent': 'MartillosYRuedasApp/1.0'
                        } 
                    })
                    .then(response => response.json())
                    .then(data => {
                        suggestionsContainer.innerHTML = '';
                        
                        if (data.length === 0) {
                            suggestionsContainer.style.display = 'none';
                            return;
                        }

                        // Filtro secundario de seguridad: nos quedamos solo con lo pertinente a San Juan de los Morros o Guárico
                        const resultadosFiltrados = data.filter(item => {
                            const direccionCompleta = item.display_name.toLowerCase();
                            return direccionCompleta.includes("san juan de los morros") || direccionCompleta.includes("guarico") || direccionCompleta.includes("guárico");
                        });

                        if (resultadosFiltrados.length === 0) {
                            suggestionsContainer.style.display = 'none';
                            return;
                        }

                        resultadosFiltrados.forEach(item => {
                            let partes = item.display_name.split(',');
                            let nombreLimpio = partes.slice(0, 3).join(',').trim();

                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.textContent = nombreLimpio;
                            
                            div.addEventListener('click', function() {
                                input.value = nombreLimpio;
                                suggestionsContainer.style.display = 'none';
                            });

                            suggestionsContainer.appendChild(div);
                        });
                        suggestionsContainer.style.display = 'block';
                    })
                    .catch(err => {
                        console.error("Error al buscar destino: ", err);
                    });
                }, 450);
            });

            // Ocultar la lista si se hace clic fuera del buscador o de las opciones
            document.addEventListener('click', function(e) {
                if (e.target !== input && e.target !== suggestionsContainer) {
                    suggestionsContainer.style.display = 'none';
                }
            });
        }

        configurarAutocompletarDestino();

        // Manejo de respuestas y alertas enviadas desde el backend
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const container = document.getElementById('status-container');
        if (status === 'success') {
            const successDiv = document.createElement('div');
            successDiv.className = 'status success';
            successDiv.textContent = '¡Viaje solicitado con éxito! Tu conductor va en camino por 700 Bs.';
            container.appendChild(successDiv);
        }
    </script>
</body>
</html>
