<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Conductor | Martillos & Ruedas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: #000; color: #fff; }
        #map { height: 60vh; width: 100%; }
        .panel { height: 40vh; background: #111; padding: 20px; text-align: center; border-top: 4px solid #ffeb3b; position: relative; }
        h2 { color: #ffeb3b; margin-top: 0; }
        .status { padding: 10px; background: #222; border-radius: 5px; display: inline-block; border: 1px solid #ffeb3b; color: #ffeb3b; font-weight: bold; }
        .btn-logout { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #ccc; text-decoration: none; border-bottom: 1px solid #ccc; padding-bottom: 2px; }
        
        /* Modal de Alerta de Viaje */
        #ride-alert { display: none; background: #ffeb3b; color: #000; padding: 20px; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 15px rgba(255, 235, 59, 0.4); }
        .btn-accept { background: #000; color: #ffeb3b; font-size: 18px; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <h2>Motorizado: {{ driver_name }}</h2>
        <div class="status" id="status-indicator">Buscando pasajeros... 📡</div>
        
        <div id="ride-alert">
            <h3 style="margin:0 0 10px 0;">¡NUEVA SOLICITUD!</h3>
            <p style="margin:0 0 15px 0; font-size: 18px; font-weight: bold;">Tarifa: $2.00</p>
            <button class="btn-accept" id="btn-accept" onclick="acceptRide()">Aceptar y Cobrar</button>
        </div>

        <a href="/logout" class="btn-logout">Cerrar Sesión</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Mapa centrado en San Juan de los Morros
        var map = L.map('map').setView([9.9120, -67.3540], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Icono del motorizado
        var driverIcon = L.divIcon({
            className: 'custom-icon',
            html: "<div style='background-color:#000; width:20px; height:20px; border-radius:50%; border:3px solid #ffeb3b;'></div>",
            iconSize: [26, 26], iconAnchor: [13, 13]
        });
        L.marker([9.9120, -67.3540], {icon: driverIcon}).addTo(map).bindPopup("Tu ubicación actual").openPopup();

        let currentRideId = null;

        // Preguntar al servidor cada 3 segundos si hay viajes nuevos
        setInterval(() => {
            if(!currentRideId) {
                fetch('/api/check_ride')
                .then(r => r.json())
                .then(data => {
                    if(data.status === 'found') {
                        currentRideId = data.ride_id;
                        document.getElementById('status-indicator').style.display = 'none';
                        document.getElementById('ride-alert').style.display = 'block';
                        
                        // Sonido de alerta (opcional, algunos navegadores lo bloquean si no hay interacción previa)
                        let audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                        audio.play().catch(e => console.log("Audio bloqueado"));
                    }
                });
            }
        }, 3000);

        function acceptRide() {
            let btn = document.getElementById('btn-accept');
            btn.innerHTML = "Procesando...";
            btn.style.backgroundColor = "#555";
            
            fetch('/api/accept_ride', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ride_id: currentRideId })
            })
            .then(r => r.json())
            .then(data => {
                alert("¡Viaje Completado! Ganancias acreditadas a tu cuenta y comisiones enviadas al Administrador.");
                // Reiniciar estado
                currentRideId = null;
                document.getElementById('ride-alert').style.display = 'none';
                document.getElementById('status-indicator').style.display = 'inline-block';
                btn.innerHTML = "Aceptar y Cobrar";
                btn.style.backgroundColor = "#000";
            });
        }
    </script>
</body>
</html>
